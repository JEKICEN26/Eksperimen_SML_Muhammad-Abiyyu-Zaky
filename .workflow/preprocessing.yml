name: Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'california_housing_raw.csv'
      - 'preprocessing/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run preprocessing
      run: |
        cd preprocessing
        python automate_Muhammad-Abiyyu-Zaky.py

    - name: Verify preprocessed dataset
      run: |
        echo "=== Verifikasi dataset preprocessing ==="
        python -c "
        import pandas as pd
        df = pd.read_csv('preprocessing/california_housing_preprocessing.csv')
        print(f'Shape: {df.shape}')
        print(f'Columns: {list(df.columns)}')
        print(df.head())
        print(f'Missing values: {df.isnull().sum().sum()}')
        "

    - name: Upload preprocessed dataset
      uses: actions/upload-artifact@v4
      with:
        name: preprocessed-dataset
        path: preprocessing/california_housing_preprocessing.csv
        retention-days: 30

    - name: Commit preprocessed dataset
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add preprocessing/california_housing_preprocessing.csv
        git diff --staged --quiet || git commit -m "Auto-update preprocessed dataset [skip ci]"
        git push || echo "Nothing to push"
